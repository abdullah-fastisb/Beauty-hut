<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products | Beauty Hut</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="section">
        <h2>Our Products</h2>
        <div class="grid">
            <div class="card">
                <h3>Rose Water Toner</h3>
                <p>$15.00</p>
                <button class="btn" onclick="addToCart('Rose Water Toner', 15.00)" style="margin-top: 10px; padding: 5px 15px;">Add to Cart</button>
            </div>
            <div class="card">
                <h3>Gold Infused Serum</h3>
                <p>$35.00</p>
                <button class="btn" onclick="addToCart('Gold Infused Serum', 35.00)" style="margin-top: 10px; padding: 5px 15px;">Add to Cart</button>
            </div>
        </div>

        <div class="form-container" style="margin-top: 4rem; background: var(--primary-pink); padding: 20px; border-radius: 10px;">
            <h3>Your Shopping Cart</h3>
            <div id="cartItems" style="margin-top: 15px;"></div>
            <h4 style="margin-top: 15px;">Total: $<span id="cartTotal">0.00</span></h4>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
